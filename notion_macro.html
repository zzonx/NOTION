<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Macro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f7fa;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chartbox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

canvas{
height:250px;
}

.value{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Macro Dashboard</h1>

<div class="grid">

<div class="chartbox">
<h3>Yield Curve (10Y-2Y)</h3>
<div class="value" id="val_T10Y2Y">Loading...</div>
<canvas id="chart_T10Y2Y"></canvas>
</div>

<div class="chartbox">
<h3>High Yield Spread</h3>
<div class="value" id="val_BAMLH0A0HYM2">Loading...</div>
<canvas id="chart_BAMLH0A0HYM2"></canvas>
</div>

<div class="chartbox">
<h3>Unemployment Rate</h3>
<div class="value" id="val_UNRATE">Loading...</div>
<canvas id="chart_UNRATE"></canvas>
</div>

<div class="chartbox">
<h3>10Y Treasury</h3>
<div class="value" id="val_DGS10">Loading...</div>
<canvas id="chart_DGS10"></canvas>
</div>

<div class="chartbox">
<h3>S&P 500</h3>
<div class="value" id="val_SP500">Loading...</div>
<canvas id="chart_SP500"></canvas>
</div>

<div class="chartbox">
<h3>VIX</h3>
<div class="value" id="val_VIXCLS">Loading...</div>
<canvas id="chart_VIXCLS"></canvas>
</div>

<div class="chartbox">
<h3>CPI</h3>
<div class="value" id="val_CPIAUCSL">Loading...</div>
<canvas id="chart_CPIAUCSL"></canvas>
</div>

<div class="chartbox">
<h3>Dollar Index</h3>
<div class="value" id="val_DTWEXBGS">Loading...</div>
<canvas id="chart_DTWEXBGS"></canvas>
</div>

</div>

<script>

const apiKey="8bb27c78dc55739611bd34574f183d9a"

async function loadSeries(seriesId){

try{

const fredUrl =
`https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${apiKey}&file_type=json`

const proxyUrl =
`https://api.codetabs.com/v1/proxy?quest=${fredUrl}`

const res = await fetch(proxyUrl)

const json = await res.json()
  
const obs = json.observations.filter(d => d.value !== ".")

const dates = obs.map(d => d.date)
const values = obs.map(d => parseFloat(d.value))

const latest = values[values.length-1].toFixed(2)

document.getElementById("val_"+seriesId).innerText =
"Latest: " + latest

new Chart(
document.getElementById("chart_"+seriesId),
{
type:"line",
data:{
labels:dates,
datasets:[{
data:values,
borderWidth:2,
pointRadius:0
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{x:{display:false}}
}
}
)

}catch(e){

console.error(seriesId,e)

document.getElementById("val_"+seriesId).innerText =
"Data unavailable"

}

}

// API 동시 호출 방지
const seriesList = [
"T10Y2Y",
"BAMLH0A0HYM2",
"UNRATE",
"DGS10",
"SP500",
"VIXCLS",
"CPIAUCSL",
"DTWEXBGS"
]

seriesList.forEach((id,i)=>{
setTimeout(()=>loadSeries(id), i*500)
})

</script>

</body>
</html>
