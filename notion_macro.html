<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Macro Economic Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="notion_macro_data.js"></script>
    <style>
      :root {
        --bg: #f1f5f9;
        --card-bg: #ffffff;
        --primary: #2563eb;
        --text: #0f172a;
        --secondary-text: #64748b;
        --border: #e2e8f0;
        --accent-blue: #eff6ff;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      header {
        max-width: 1400px;
        margin: 0 auto 30px;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
      }
      /*TOP SUMMARY STYLE*/
      .top-summary {
        max-width: 1400px;
        margin: 0 auto 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }
      .summary-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border);
      }
      .summary-card h4 {
        margin: 0 0 15px 0;
        font-size: 1.15rem;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--primary);
      }
      .summary-content {
        font-size: 0.95rem;
        color: #334155;
        white-space: pre-line;
        line-height: 1.7;
      }

      .category-section {
        max-width: 1400px;
        margin: 0 auto 20px;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .category-header {
        background: #fff;
        padding: 20px 25px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        border-bottom: 1px solid var(--border);
      }
      .category-content {
        display: none;
        padding: 25px;
        gap: 25px;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      }
      .category-content.active {
        display: grid;
      }

      .chartbox {
        background: #fff;
        border: 1px solid var(--border);
        padding: 20px;
        border-radius: 12px;
        position: relative;
        display: flex;
        flex-direction: column;
        transition: transform 0.2s;
      }
      .chartbox:hover {
        transform: translateY(-3px);
        border-color: var(--primary);
      }
      .chartbox h3 {
        margin: 0 0 10px 0;
        font-size: 1.1rem;
        color: var(--primary);
        border-bottom: 1px solid #f1f5f9;
        padding-bottom: 8px;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
      }

      .range-tabs {
        display: flex;
        gap: 5px;
        margin-bottom: 15px;
      }
      .range-btn {
        padding: 4px 10px;
        font-size: 0.75rem;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        color: var(--secondary-text);
      }
      .range-btn.active {
        background: var(--primary);
        color: #fff;
        font-weight: bold;
      }

      .value {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 15px;
        color: #1e293b;
      }
      .canvas-container {
        height: 220px;
        position: relative;
        margin-bottom: 20px;
      }
      .retry-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 10;
        cursor: pointer;
        pointer-events: all;
      }
      .retry-svg {
        width: 60px;
        height: 60px;
        fill: none;
        stroke: var(--primary);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.4s ease;
      }
      .retry-overlay:hover .retry-svg {
        transform: rotate(180deg);
      }

      .info-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: auto;
      }
      .info-item {
        padding: 10px 12px;
        border-radius: 6px;
        background: #f8fafc;
        border-left: 3px solid #cbd5e1;
      }
      .info-item.key-insight {
        background: #f8fafc;
        border-left: 3px solid #cbd5e1;
      }
      .info-label {
        font-size: 0.7rem;
        font-weight: 800;
        color: #64748b;
        text-transform: uppercase;
        margin-bottom: 2px;
        display: block;
      }
      .info-text {
        font-size: 0.85rem;
        color: #334155;
        line-height: 1.4;
        display: block;
      }
      .insight-highlight {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Macro Economic Terminal</h1>
      <p style="color: var(--secondary-text); margin: 5px 0 0 0">
        FRED Comprehensive Macro Analysis Dashboard
      </p>
    </header>

    <div id="top-summary-container" class="top-summary"></div>
    <div id="dashboard-container"></div>

    <script>
      // 내부 상태 관리 변수
      let masterData = {};
      let chartInstances = {};
      const themes = {
        growth: "1. GROWTH (경기)",
        stress: "2. FINANCIAL STRESS (금융 스트레스)",
        rates: "3. INTEREST RATES (금리)",
        liquidity: "4. LIQUIDITY (유동성)",
        market: "5. MARKET INDEX (시장)",
      };
      /* themes Colors */
      const categoryColors = {
        growth: { border: "#2563eb", bg: "rgba(37, 99, 235, 0.05)" }, // 파랑 (경기)
        stress: { border: "#dc2626", bg: "rgba(220, 38, 38, 0.05)" }, // 빨강 (스트레스)
        rates: { border: "#7c3aed", bg: "rgba(124, 58, 237, 0.05)" }, // 보라 (금리)
        liquidity: { border: "#059669", bg: "rgba(5, 150, 105, 0.05)" }, // 녹색 (유동성)
        market: { border: "#ea580c", bg: "rgba(234, 88, 12, 0.05)" }, // 주황 (시장)
      };

      function initDashboard() {
        // 1. 상단 요약 카드 생성
        const topContainer = document.getElementById("top-summary-container");
        if (typeof dashboardSummary !== "undefined") {
          Object.keys(dashboardSummary).forEach((key) => {
            const item = dashboardSummary[key];
            topContainer.innerHTML += `
              <div class="summary-card">
                <h4>${item.icon} ${item.title}</h4>
                <div class="summary-content">${item.content}</div>
              </div>`;
          });
        }

        // 2. 카테고리 및 지표 박스 생성
        const container = document.getElementById("dashboard-container");
        Object.keys(themes).forEach((group) => {
          const theme = categoryColors[group] || categoryColors.growth;

          container.innerHTML += `
          <div class="category-section">
            <div class="category-header"
              style="border-left:6px solid ${theme.border}; background:${theme.bg}"
              onclick="toggleSection(this)">
              ${themes[group]} <span>▼</span>
            </div>
             <div class="category-content active" id="grid-${group}"></div>
          </div>`;
        });

        Object.keys(seriesInfo).forEach((id) => {
          const info = seriesInfo[id];
          const grid = document.getElementById(`grid-${info.group}`);
          if (!grid) return;

          grid.innerHTML += `
            <div class="chartbox">
              <h3>${info.name}</h3>
              <div class="range-tabs" id="tabs_${id}"></div>
              <div class="value" id="val_${id}">Loading...</div>
                <div class="canvas-container">
                    <canvas id="chart_${id}"></canvas>
                    <div class="retry-overlay" id="retry_${id}" onclick="loadSeries('${id}')">
                        <svg class="retry-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
                        </svg>
                    </div>
                </div>
              <div class="info-list">
                ${info.definition ? `<div class="info-item"><span class="info-label">1. Definition</span><span class="info-text">${info.definition}</span></div>` : ""}
                ${info.interpretation ? `<div class="info-item"><span class="info-label">2. Interpretation</span><span class="info-text">${info.interpretation}</span></div>` : ""}
                ${info.marketImpact ? `<div class="info-item"><span class="info-label">3. Market Impact</span><span class="info-text">${info.marketImpact}</span></div>` : ""}
              ${info.keyInsight ? `<div class="info-item key-insight"><span class="info-label">4. Key Insight</span><span class="info-text insight-highlight">${info.keyInsight}</span></div>` : ""}
                </div>
            </div>`;

          setTimeout(() => applyTheme(id), 0);
        });
      }

      function toggleSection(header) {
        header.nextElementSibling.classList.toggle("active");
      }

      async function loadSeries(id) {
        const valElement = document.getElementById("val_" + id);
        const retryOverlay = document.getElementById("retry_" + id);
        retryOverlay.style.display = "none";
        valElement.innerText = "Loading...";

        // 🟢 JS 파일에 정의된 apiKey를 사용합니다.
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.stlouisfed.org/fred/series/observations?series_id=${id}&api_key=${apiKey}&file_type=json`)}`;

        try {
          const res = await fetch(url);
          const data = await res.json();
          const json = JSON.parse(data.contents);
          const obs = json.observations
            .filter((o) => o.value !== ".")
            .map((o) => ({ date: o.date, value: parseFloat(o.value) }));

          masterData[id] = obs;
          createRangeButtons(id);
          updateChartRange(id, "MAX");
        } catch (e) {
          valElement.innerText = "Error";
          retryOverlay.style.display = "flex";

          applyTheme(id);
        }
      }

      function createRangeButtons(id) {
        const obs = masterData[id];
        const diffYears =
          (new Date(obs[obs.length - 1].date) - new Date(obs[0].date)) /
          (1000 * 60 * 60 * 24 * 365);
        const tabContainer = document.getElementById(`tabs_${id}`);
        const ranges = [
          { l: "1Y", v: 1 },
          { l: "5Y", v: 5 },
          { l: "10Y", v: 10 },
          { l: "MAX", v: 999 },
        ];

        tabContainer.innerHTML = "";
        ranges.forEach((r) => {
          if (r.v === 999 || diffYears >= r.v) {
            const btn = document.createElement("button");
            btn.className = "range-btn" + (r.l === "MAX" ? " active" : "");
            btn.innerText = r.l;
            btn.onclick = () => {
              tabContainer
                .querySelectorAll(".range-btn")
                .forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              updateChartRange(id, r.l);
            };
            tabContainer.appendChild(btn);
          }
        });
      }

      function updateChartRange(id, label) {
        const full = masterData[id];
        let filtered = full;
        if (label !== "MAX") {
          const years = parseInt(label);
          const cutoff = new Date(full[full.length - 1].date);
          cutoff.setFullYear(cutoff.getFullYear() - years);
          filtered = full.filter((d) => new Date(d.date) >= cutoff);
        }
        renderChart(id, filtered);
      }
      function applyTheme(id) {
        const info = seriesInfo[id];
        const theme = categoryColors[info.group] || categoryColors.growth;

        const box = document.querySelector(`#val_${id}`).closest(".chartbox");

        /* 타이틀 */
        const title = box.querySelector("h3");
        if (title) title.style.color = theme.border;

        /* 값 */
        const valEl = document.getElementById(`val_${id}`);
        if (valEl) valEl.style.color = theme.border;

        /* Key Insight */

        const insightBox = box.querySelector(".key-insight");

        if (insightBox) {
          insightBox.style.background = theme.bg;
          insightBox.style.borderLeft = `3px solid ${theme.border}`;

          const text = insightBox.querySelector(".insight-highlight");
          if (text) text.style.color = theme.border;
        }
      }
      function renderChart(id, data) {
        applyTheme(id);
        const info = seriesInfo[id];
        const theme = categoryColors[info.group] || categoryColors.growth;

        const box = document.querySelector(`#val_${id}`).closest(".chartbox");

        /* 타이틀 색 */
        box.querySelector("h3").style.color = theme.border;

        /* 현재값 */
        const latest = data[data.length - 1].value;
        const valEl = document.getElementById(`val_${id}`);

        valEl.innerText = latest.toLocaleString(undefined, {
          minimumFractionDigits: 2,
        });

        valEl.style.color = theme.border;

        /* Key Insight 스타일 */

        const insightBox = box.querySelector(".key-insight");

        if (insightBox) {
          insightBox.style.background = theme.bg;
          insightBox.style.borderLeft = `3px solid ${theme.border}`;

          const text = insightBox.querySelector(".insight-highlight");

          if (text) text.style.color = theme.border;
        }

        /* 차트 */

        const ctx = document.getElementById(`chart_${id}`).getContext("2d");

        if (chartInstances[id]) chartInstances[id].destroy();

        chartInstances[id] = new Chart(ctx, {
          type: "line",
          data: {
            labels: data.map((d) => d.date),
            datasets: [
              {
                data: data.map((d) => d.value),
                borderColor: theme.border,
                borderWidth: 1.5,
                pointRadius: 0,
                fill: true,
                backgroundColor: theme.bg,
                tension: 0.1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                ticks: {
                  maxTicksLimit: 6,
                  callback: function (v, i) {
                    return data[i].date.split("-")[0];
                  },
                },
              },
              y: {
                position: "right",
                grid: { color: "#f1f5f9" },
                ticks: { font: { size: 10 } },
              },
            },
          },
        });
      }
      window.onload = () => {
        initDashboard();
        Object.keys(seriesInfo).forEach((id, i) =>
          setTimeout(() => loadSeries(id), i * 350),
        );
      };
    </script>
  </body>
</html>
