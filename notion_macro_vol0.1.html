<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Macro Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin:40px; background:#fafafa; }
    .buttons { display:flex; gap:10px; margin-bottom:20px; }
    .buttons button { display:flex; align-items:center; gap:5px; padding:8px 12px; font-size:14px; cursor:pointer; }
    .chartbox { background:white; padding:20px; margin-bottom:30px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    canvas { width:100%; height:300px; }
  </style>
</head>
<body>
  <h1>Macro Dashboard</h1>
  <div class="buttons">
    <a href="macro.html" style="text-decoration:none;"><button>← Back</button></a>
    <a href="index.html" style="text-decoration:none;"><button>🏠 Go to Homepage</button></a>
    <button id="refreshBtn">🔄 Refresh Data</button>
  </div>

  <div class="chartbox">
    <h3>10Y-2Y Treasury Spread</h3>
    <div id="val_T10Y2Y">Loading...</div>
    <canvas id="chart_T10Y2Y"></canvas>
  </div>

  <div class="chartbox">
    <h3>High Yield Credit Spread</h3>
    <div id="val_BAMLH0A0HYM2">Loading...</div>
    <canvas id="chart_BAMLH0A0HYM2"></canvas>
  </div>

  <div class="chartbox">
    <h3>US Unemployment Rate</h3>
    <div id="val_UNRATE">Loading...</div>
    <canvas id="chart_UNRATE"></canvas>
  </div>

<script>
const apiKey = "8bb27c78dc55739611bd34574f183d9a";
const CACHE_TIME = 24*60*60*1000; // 24시간 캐시

// 공용 프록시 목록 (fallback)
const proxies = [
  "https://api.codetabs.com/v1/proxy?quest=",
  "https://api.allorigins.win/raw?url=",
  "https://thingproxy.freeboard.io/fetch/"
];

// 안전하게 fetch + fallback
async function fetchWithFallback(url) {
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url));
      const text = await res.text();
      if (text.startsWith("<")) continue; // HTML 반환 시 실패
      return JSON.parse(text);
    } catch(e) {
      console.warn("Proxy failed, trying next:", proxy);
    }
  }
  throw new Error("All proxies failed");
}

// 차트 렌더링
function renderChart(seriesId, json) {
  const obs = json.observations.filter(d=>d.value!==".").slice(-120);
  const dates = obs.map(d=>d.date);
  const values = obs.map(d=>parseFloat(d.value));
  const latest = values[values.length-1];
  document.getElementById("val_"+seriesId).innerText = "Latest: "+latest;

  new Chart(document.getElementById("chart_"+seriesId), {
    type:"line",
    data:{labels:dates,datasets:[{data:values,borderWidth:2,pointRadius:0}]},
    options:{responsive:true,animation:{duration:1000},plugins:{legend:{display:false}},scales:{x:{display:false}}}
  });
}

// 시리즈 로드 (캐시 + fetch)
async function loadSeries(seriesId, force=false) {
  const cacheKey = "fredData_" + seriesId;
  const cacheTimeKey = "fredDataTime_" + seriesId;
  const now = Date.now();

  if(!force){
    const cached = localStorage.getItem(cacheKey);
    const cachedTime = localStorage.getItem(cacheTimeKey);
    if(cached && cachedTime && now - cachedTime < CACHE_TIME){
      renderChart(seriesId, JSON.parse(cached));
      return;
    }
  }

  const fredUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${apiKey}&file_type=json`;
  try {
    const json = await fetchWithFallback(fredUrl);
    localStorage.setItem(cacheKey, JSON.stringify(json));
    localStorage.setItem(cacheTimeKey, now);
    renderChart(seriesId,json);
  } catch(e){
    console.error("Failed to load series:", seriesId, e);
    alert(`Series ${seriesId} 데이터 요청 실패! 콘솔 확인`);
  }
}

// 모든 시리즈 로드
const seriesList = ["T10Y2Y","BAMLH0A0HYM2","UNRATE"];
function loadAll(force=false){
  Promise.all(seriesList.map(s=>loadSeries(s,force))).then(()=>console.log("All charts loaded"));
}

loadAll();
document.getElementById("refreshBtn").addEventListener("click", ()=>loadAll(true));
</script>
</body>
</html>
